<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 48" fill="none">
  <!-- Lobster Claw Icon -->
  <g transform="translate(4, 4)">
    <!-- Left pincer -->
    <path d="M8 32 C8 32 2 24 4 16 C6 8 12 4 18 6 C20 7 20 10 18 12 C14 16 12 20 14 26 L8 32Z" fill="#FF3D00" opacity="0.9"/>
    <!-- Right pincer -->
    <path d="M32 32 C32 32 38 24 36 16 C34 8 28 4 22 6 C20 7 20 10 22 12 C26 16 28 20 26 26 L32 32Z" fill="#FF3D00" opacity="0.9"/>
    <!-- Body/joint -->
    <ellipse cx="20" cy="28" rx="8" ry="6" fill="#D32F2F"/>
    <!-- Highlights -->
    <path d="M14 14 C16 12 18 13 17 16" stroke="#FF6E40" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <path d="M26 14 C24 12 22 13 23 16" stroke="#FF6E40" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <!-- Eye dots -->
    <circle cx="16" cy="22" r="1.5" fill="#FFF" opacity="0.8"/>
    <circle cx="24" cy="22" r="1.5" fill="#FFF" opacity="0.8"/>
  </g>
  <!-- "OpenClaw" wordmark -->
  <text x="52" y="33" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="700" font-size="26" letter-spacing="0.5" fill="#48333D">
    <tspan fill="#48333D">Open</tspan><tspan fill="#FF3D00">Claw</tspan>
  </text>
</svg>
